name: Generate Report

on:
  workflow_dispatch:   # triggered by update.yml or manually

permissions:
  contents: write
  actions: write       # required to trigger deploy.yml

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt

      - name: Generate findings.md and findings.json
        run: python -c "from src.report import run_report; run_report()"

      - name: Commit findings/ to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add findings/
          git diff --cached --quiet || git commit -m "chore: update findings $(date +%Y-%m-%d)"
          git push

      - name: Trigger deploy workflow
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}"
