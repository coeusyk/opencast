name: Monthly data update

on:
  schedule:
    # 03:00 UTC on the 1st of every month
    - cron: "0 3 1 * *"
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Rust toolchain & fetcher ──────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fetcher/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('fetcher/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Rust fetcher
        run: cargo build --release
        working-directory: fetcher

      # ── Python environment ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt

      # ── Stockfish ────────────────────────────────────────────────────────
      - name: Install Stockfish
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y stockfish

      # ── Pipeline ─────────────────────────────────────────────────────────
      - name: Fetch missing months (incremental)
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          python - <<'EOF'
          import json, subprocess, os
          from pathlib import Path
          from datetime import date

          FETCH_START = "2023-01"

          def month_range(start: str, end: str) -> list[str]:
              sy, sm = map(int, start.split("-"))
              ey, em = map(int, end.split("-"))
              y, m = sy, sm
              out = []
              while (y, m) <= (ey, em):
                  out.append(f"{y:04d}-{m:02d}")
                  m += 1
                  if m > 12:
                      m, y = 1, y + 1
              return out

          with open("openings.json") as f:
              openings = json.load(f)
          eco_codes = [o["eco"] for o in openings]

          raw_dir = Path("data/raw")
          raw_dir.mkdir(parents=True, exist_ok=True)
          existing = {p.stem for p in raw_dir.glob("*.json")}

          today = date.today()
          # Fetch the *previous* month (now complete) rather than the current
          # month which is still in progress and would snapshot incomplete data.
          if today.month == 1:
              prev_year, prev_month = today.year - 1, 12
          else:
              prev_year, prev_month = today.year, today.month - 1

          latest_complete = f"{prev_year:04d}-{prev_month:02d}"
          months = month_range(FETCH_START, latest_complete)
          missing = [
              month for month in months
              if any(f"{eco}_{month}" not in existing for eco in eco_codes)
          ]

          if missing:
              first, last = missing[0], missing[-1]
              print(f"Fetching {len(missing)} missing month(s): {first}..{last}")
              env = os.environ.copy()
              subprocess.run(
                  ["target/release/fetcher", "--from", first, "--to", last],
                  env=env,
                  check=True,
                  cwd="fetcher",
              )
          else:
              print("Nothing to fetch.")
          EOF

      - name: Run ingest → timeseries → engine delta → visualizer
        run: |
          # Remove cached CSVs so the pipeline regenerates them
          rm -f data/processed/openings_ts.csv \
                data/output/forecasts.csv \
                data/output/engine_delta.csv \
                data/output/dashboard.html
          python main.py

      - name: Generate FINDINGS.md
        run: python -c "from src.report import generate_report; generate_report()"

      # ── Commit updated outputs ────────────────────────────────────────────
      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add FINDINGS.md data/output/dashboard.html \
                  data/output/forecasts.csv data/output/engine_delta.csv \
                  data/processed/openings_ts.csv
          git diff --cached --quiet || git commit -m "chore: auto-update $(date +%Y-%m)"
          git push

  # ── Deploy dashboard to GitHub Pages ─────────────────────────────────────
  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Check if GitHub Pages is enabled
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status_code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")

          if [ "$status_code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Pages is not enabled for ${{ github.repository }}. Enable it in Settings > Pages > Source: GitHub Actions."
          fi

      - name: Configure GitHub Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Add index.html redirect for GitHub Pages
        if: steps.pages.outputs.enabled == 'true'
        run: |
          cp data/output/dashboard.html data/output/index.html

      - name: Upload dashboard as Pages artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: data/output/

      - name: Deploy to GitHub Pages
        if: steps.pages.outputs.enabled == 'true'
        id: deploy
        uses: actions/deploy-pages@v4
