name: Deploy Dashboard

on:
  workflow_dispatch:   # manual trigger, always available

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt

      - name: Build modular dashboard
        # findings/findings.json is read by run_visualizer() if it exists;
        # if it has not been generated yet the dashboard still renders (graceful degradation).
        run: python -c "from src.visualizer import run_visualizer; run_visualizer()"

      - name: Check if GitHub Pages is enabled
        id: pages-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status_code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          if [ "$status_code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Pages is not enabled for ${{ github.repository }}. Enable it in Settings > Pages > Source: GitHub Actions."
          fi

      - name: Configure GitHub Pages
        if: steps.pages-check.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Upload dashboard as Pages artifact
        if: steps.pages-check.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: data/output/dashboard/

      - name: Deploy to GitHub Pages
        if: steps.pages-check.outputs.enabled == 'true'
        id: deploy-pages
        uses: actions/deploy-pages@v5
