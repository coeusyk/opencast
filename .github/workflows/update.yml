name: Update Data

on:
  schedule:
    - cron: '0 4 1 * *'   # 1st of every month, 4am UTC
  workflow_dispatch:       # manual trigger

permissions:
  contents: write
  actions: write           # required to trigger report.yml

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      months_fetched: ${{ steps.fetch_step.outputs.months_fetched }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # ── Rust toolchain & fetcher ─────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fetcher/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('fetcher/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Rust fetcher
        run: cargo build --release
        working-directory: fetcher

      # ── Fetch missing months ─────────────────────────────────────────────────────────
      - name: Fetch missing months (incremental)
        id: fetch_step
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          python - <<'EOF'
          import json, subprocess, os
          from pathlib import Path
          from datetime import date

          with open("config.json") as f:
              cfg = json.load(f)
          FETCH_START = cfg["fetch_start"]

          def month_range(start: str, end: str) -> list:
              sy, sm = map(int, start.split("-"))
              ey, em = map(int, end.split("-"))
              y, m = sy, sm
              out = []
              while (y, m) <= (ey, em):
                  out.append(f"{y:04d}-{m:02d}")
                  m += 1
                  if m > 12:
                      m, y = 1, y + 1
              return out

          with open("openings.json") as f:
              openings = json.load(f)
          eco_codes = [o["eco"] for o in openings]

          raw_dir = Path("data/raw")
          raw_dir.mkdir(parents=True, exist_ok=True)
          existing = {p.stem for p in raw_dir.glob("*.json")}

          today = date.today()
          if today.month == 1:
              prev_year, prev_month = today.year - 1, 12
          else:
              prev_year, prev_month = today.year, today.month - 1

          latest_complete = f"{prev_year:04d}-{prev_month:02d}"
          months = month_range(FETCH_START, latest_complete)
          missing = [
              month for month in months
              if any(f"{eco}_{month}" not in existing for eco in eco_codes)
          ]

          fetched_count = len(missing) if missing else 0

          if missing:
              first, last = missing[0], missing[-1]
              print(f"Fetching {len(missing)} missing month(s): {first}..{last}")
              env = os.environ.copy()
              subprocess.run(
                  ["target/release/fetcher", "--from", first, "--to", last],
                  env=env,
                  check=True,
                  cwd="fetcher",
              )
          else:
              print("Nothing to fetch.")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"months_fetched={fetched_count}\n")
          EOF

      - name: Commit fetched raw data
        if: steps.fetch_step.outputs.months_fetched != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          git diff --cached --quiet || git commit -m "chore: fetch raw data $(date +%Y-%m)"
          git push

  process:
    needs: fetch
    if: >
      needs.fetch.outputs.months_fetched != '0' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # ── Python environment ──────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt

      # ── Stockfish ────────────────────────────────────────────────────────────────────
      - name: Install Stockfish
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y stockfish

      # ── Pipeline ─────────────────────────────────────────────────────────────────────
      - name: Run ingest → select → timeseries → engine delta
        run: |
          rm -f data/processed/openings_ts.csv \
                data/output/forecasts.csv \
                data/output/engine_delta.csv \
                data/output/dashboard.html
          python -c "
          from src.ingest import ingest
          from src.select_openings import run_select_openings
          from src.timeseries import run_timeseries
          from src.engine_delta import run_engine_delta
          ingest()
          run_select_openings()
          run_timeseries()
          run_engine_delta()
          "

      - name: Commit updated outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/openings_ts.csv \
                  data/output/forecasts.csv \
                  data/output/engine_delta.csv \
                  data/openings_catalog.csv \
                  data/output/long_tail_stats.csv
          git diff --cached --quiet || git commit -m "chore: auto-update $(date +%Y-%m)"
          git push

      - name: Trigger report workflow
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run report.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}"
