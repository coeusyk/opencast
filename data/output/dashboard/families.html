<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Families — OpenCast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300..600&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,600,500,400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/opencast_icon.png">
  <link rel="apple-touch-icon" href="assets/opencast_icon.png">
  <link rel="stylesheet" href="assets/shared.css">
  
<style>
/* Site nav */
.site-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(11,13,16,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  height: 52px;
}
.nav-inner {
  max-width: 1200px; margin: 0 auto;
  width: 100%;
  box-sizing: border-box;
  padding: 0 1rem; height: 100%;
  display: flex; align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.brand-lockup {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  text-decoration: none;
}
.brand-logo {
  width: 24px;
  height: 24px;
  object-fit: contain;
  border-radius: 4px;
}
.nav-wordmark {
  font-family: 'Satoshi', 'Inter', sans-serif;
  font-weight: 700; font-size: 1.05rem;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}
.nav-links { display: flex; gap: 1.5rem; align-items: center; }
.nav-toggle {
  display: none;
  width: 2.5rem;
  height: 2.5rem;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 6px;
  background: rgba(255,255,255,0.02);
  color: var(--text-primary);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0.25rem;
}
.nav-toggle-bar {
  display: block;
  width: 1rem;
  height: 2px;
  border-radius: 999px;
  background: currentColor;
}
.nav-link {
  font-size: 0.875rem; font-weight: 500;
  color: var(--text-secondary); text-decoration: none;
  padding: 0.45rem 0.15rem;
  transition: color 150ms;
}
.nav-link:hover, .nav-link.active { color: var(--text-primary); }
body { font-family: 'Satoshi', 'Inter', sans-serif; }

@media (max-width: 760px) {
  .nav-inner {
    padding: 0 0.75rem;
  }
  .nav-toggle {
    display: inline-flex;
  }
  .nav-links {
    position: absolute;
    top: calc(100% + 0.45rem);
    right: 0.75rem;
    left: 0.75rem;
    display: none;
    flex-direction: column;
    align-items: stretch;
    gap: 0.15rem;
    background: rgba(11,13,16,0.98);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 0.45rem;
  }
  .nav-links.open {
    display: flex;
  }
  .nav-link {
    display: block;
    font-size: 0.92rem;
    padding: 0.65rem 0.6rem;
    border-radius: 6px;
  }
}
</style>
  <style>
.families-shell { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 4rem; }
.families-hero { display: grid; grid-template-columns: 1.2fr 1fr; gap: 1.25rem; margin-bottom: 2rem; }
.engine-box {
  background: var(--surface-raised);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px;
  padding: 1rem 1.1rem;
}
.families-title { margin: 0 0 0.45rem; font-size: 1.8rem; letter-spacing: -0.02em; }
.families-subtitle { margin: 0; color: var(--text-secondary); line-height: 1.6; }
.metric-label { margin: 0 0 0.25rem; font-size: 0.78rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; }
.metric-value { margin: 0; font-size: 1.35rem; font-weight: 700; color: var(--text-primary); }
.analysis-section { display: grid; grid-template-columns: 1fr; gap: 1rem; }
.family-chip {
  display: inline-block;
  min-width: 1.75rem;
  text-align: center;
  padding: 0.15rem 0.45rem;
  border-radius: 6px;
  background: color-mix(in srgb, var(--chip-color) 20%, transparent);
  color: var(--chip-color);
  font-weight: 700;
}
@media (max-width: 900px) {
  .families-shell { padding: 2rem 1.25rem 3rem; }
  .families-hero { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<nav id="main-nav" class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="brand-lockup" aria-label="OpenCast home">
      <img src="assets/opencast_icon.png" alt="OpenCast logo" class="brand-logo" />
      <span class="nav-wordmark">OpenCast</span>
    </a>
    <button type="button" class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav-links">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>
    <div id="site-nav-links" class="nav-links">
    <a href="index.html" class="nav-link">Overview</a>
    <a href="openings.html" class="nav-link">Openings</a>
    <a href="families.html" class="nav-link active">Families</a>
    
    </div>
  </div>
</nav>
<main><div class="page-content">

<section class="families-shell">
  <section class="families-hero">
    <div class="engine-box">
      <h1 class="families-title">ECO Families</h1>
      <p class="families-subtitle">Family-level performance summary using historical observed win rates across tracked openings.</p>
    </div>
    <div class="engine-box">
      <p class="metric-label">Tracked Openings</p>
      <p class="metric-value">280</p>
      <p class="metric-label" style="margin-top:0.9rem;">Weighted Avg Win Rate</p>
      <p class="metric-value">0.491</p>
    </div>
  </section>

  <section class="analysis-section">
    <div class="engine-box">
      <table class="data-table" style="margin:0;">
        <thead>
          <tr><th>Family</th><th>Openings tracked</th><th>Avg win rate</th></tr>
        </thead>
        <tbody><tr><td><span class="family-chip" style="--chip-color:#7CC7FF">A</span></td><td>59</td><td>0.495</td></tr><tr><td><span class="family-chip" style="--chip-color:#7BE495">B</span></td><td>62</td><td>0.481</td></tr><tr><td><span class="family-chip" style="--chip-color:#F6C177">C</span></td><td>62</td><td>0.493</td></tr><tr><td><span class="family-chip" style="--chip-color:#F28DA6">D</span></td><td>52</td><td>0.492</td></tr><tr><td><span class="family-chip" style="--chip-color:#B9A5FF">E</span></td><td>45</td><td>0.495</td></tr></tbody>
      </table>
    </div>
  </section>
</section>

</div></main>
<script src="assets/nav.js"></script>
<script>
(() => {
  const toggle = document.querySelector('.nav-toggle');
  const links = document.getElementById('site-nav-links');
  if (!toggle || !links) return;

  const closeMenu = () => {
    links.classList.remove('open');
    toggle.setAttribute('aria-expanded', 'false');
  };

  toggle.addEventListener('click', () => {
    const isOpen = links.classList.toggle('open');
    toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });

  document.addEventListener('click', (event) => {
    if (!event.target) return;
    if (toggle.contains(event.target) || links.contains(event.target)) return;
    closeMenu();
  });

  window.addEventListener('resize', () => {
    if (window.innerWidth > 760) closeMenu();
  });
})();
</script>
</body>
</html>
